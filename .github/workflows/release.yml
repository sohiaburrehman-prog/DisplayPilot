name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore
        shell: pwsh

      - name: Build
        run: dotnet build -c Release
        shell: pwsh

      - name: MonitorLogicTest
        run: dotnet run --project tools/MonitorLogicTest/MonitorLogicTest.csproj -c Release
        shell: pwsh

      - name: Publish framework-dependent
        run: dotnet publish -c Release -p:PublishProfile=FolderProfile
        shell: pwsh

      - name: Publish self-contained portable
        run: dotnet publish -c Release -p:PublishProfile=SelfContained
        shell: pwsh

      - name: Build installer
        run: |
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) { throw "Inno Setup not found at $iscc" }
          & $iscc installer\DisplayPilot.iss
        shell: pwsh

      - name: Create portable zip
        run: Compress-Archive -Path publish-selfcontained\* -DestinationPath DisplayPilot-Portable.zip -Force
        shell: pwsh

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/output/DisplayPilot-Setup.exe
            DisplayPilot-Portable.zip
          generate_release_notes: true
